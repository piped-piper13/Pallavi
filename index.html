<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Drama Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Spill The Tea ☕</h1>
            <p>Our private, unhinged secret drama board.</p>
        </header>

        <div class="drama-form">
            <input type="text" id="aliasInput" placeholder="Your Secret Alias (e.g., GossipGirl)...">
            <textarea id="dramaInput" placeholder="What's the tea today? Drop the drama here..."></textarea>
            <button id="postBtn">Post to the Feed</button>
        </div>

        <div id="feedContainer" class="entries-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
